name: Bug report
description: Something broke or behaved unexpectedly
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you see? Paste error messages verbatim if there were any.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to /lock
        2. Upload a 50 MB PDF
        3. ...
    validations:
      required: true
  - type: dropdown
    id: tool
    attributes:
      label: Which part?
      options:
        - Compress
        - Lock
        - Unlock
        - Queue page
        - API
        - Local development
        - Other
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser + OS for the site, or OS + versions for local dev. If reporting against the live site, include the commit from https://api-production-9ae1.up.railway.app/health if you can.
      placeholder: e.g. Safari 19 / macOS, commit ab12cd3
