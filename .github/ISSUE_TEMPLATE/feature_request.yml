name: Feature request
description: Suggest a tool or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the situation where you needed this.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen?
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways this could work, or tools you use today instead.
